<div x-data="userGistList" x-init="loadGists()" class="container py-5">
    <div class="flex justify-between items-center mb-4">
        <h2>
            <span class="text-muted">Gists for</span> 
            <span class="text-primary" x-text="username"></span>
        </h2>
        <a href="/" x-turnout class="btn btn-sm btn-outline">← Back to Search</a>
    </div>

    <hr>

    <template x-if="loading">
        <div class="text-center py-5">
            <div class="spinner"></div>
            <p>Fetching public gists...</p>
        </div>
    </template>

    <div class="grid" x-show="!loading">
        <template x-for="gist in gists" :key="gist.id">
            <div class="card p-4 mb-3 shadow-sm hover-up">
                <div class="flex justify-between items-start">
                    <div>
                        <h4 class="mb-1">
                            <code x-text="getFirstFilename(gist)"></code>
                        </h4>
                        <p class="text-muted small mb-3" 
                           x-text="gist.description || 'No description provided.'">
                        </p>
                    </div>
                    <span class="badge bg-light text-dark" 
                          x-text="Object.keys(gist.files).length + ' files'"></span>
                </div>
                
                <div class="flex gap-2">
                    <a :href="'/playground?id=' + gist.id" 
                       x-turnout 
                       class="btn btn-primary btn-sm">
                        Open in Playground
                    </a>
                    <a :href="gist.html_url" 
                       target="_blank" 
                       class="btn btn-link btn-sm text-decoration-none">
                        View on GitHub ↗
                    </a>
                </div>
            </div>
        </template>

        <template x-if="gists.length === 0 && !loading">
            <div class="text-center py-5">
                <p class="h4 text-muted">No public gists found for this user.</p>
            </div>
        </template>
    </div>
</div>

<script>
    // Component logic specifically for the User List view
    document.addEventListener('alpine:init', () => {
        Alpine.data('userGistList', () => ({
            username: new URLSearchParams(window.location.search).get('user') || '',
            gists: [],
            loading: false,

            async loadGists() {
                if (!this.username) return;
                this.loading = true;
                try {
                    const response = await fetch(`https://api.github.com/users/${this.username}/gists`);
                    if (!response.ok) throw new Error('User not found');
                    this.gists = await response.json();
                } catch (err) {
                    console.error(err);
                    alert("Could not load gists. Check the username.");
                } finally {
                    this.loading = false;
                }
            },

            getFirstFilename(gist) {
                return Object.keys(gist.files)[0] || 'untitled';
            }
        }))
    })
</script>
