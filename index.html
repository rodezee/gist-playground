<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gist Playground</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="gist-playground.js"></script>
    <script defer src="https://unpkg.com/alpinejs"></script>

    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-header: #323233;
            --border: #454545;
            --text-main: #cccccc;
            --accent: #007acc;
            --accent-hover: #1f8ad2;
        }

        [x-cloak] { display: none !important; }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Button Design System */
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #3c3c3c;
            color: white;
        }
        .btn:hover { background: #4a4a4a; }
        .btn-primary { background: var(--accent); border: none; color: white; }
        .btn-primary:hover { background: var(--accent-hover); }

        /* Top Navigation */
        .top-nav {
            background: var(--bg-header);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .brand { font-weight: bold; cursor: pointer; color: #fff; font-size: 0.9rem; }
        .preview-meta { font-size: 0.75rem; color: #888; flex: 1; text-align: center; }

        /* Main Workspace */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .col-sidebar {
            width: 220px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-label { font-size: 0.7rem; font-weight: bold; padding: 10px; letter-spacing: 1px; color: #666; }
        .file-link { padding: 6px 15px; cursor: pointer; font-size: 0.85rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-link:hover { background: #2a2d2e; color: #fff; }
        .file-active { background: #37373d !important; color: #fff !important; border-left: 2px solid var(--accent); }

        /* Code Editor Area */
        .col-code { flex: 1; background: var(--bg-dark); overflow: auto; border-right: 1px solid var(--border); }
        textarea { width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; border: none; padding: 20px; font-family: 'Fira Code', monospace; resize: none; outline: none; }

        /* Preview Area */
        .col-preview { flex: 1; background: #fff; display: flex; flex-direction: column; }
        #preview-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Dashboard Views */
        .full-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }
        .gist-card { background: var(--bg-sidebar); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        .gist-card h3 { margin-top: 0; font-size: 1.1rem; }
        .tagger { display: inline-block; background: #3c3c3c; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; margin-right: 5px; color: #4ec9b0; }
    </style>
</head>
<body x-data="gistPlayground">

    <header class="top-nav">
        <div class="brand" @click="view = 'home'; history.pushState({}, '', '/')">🚀 MY GISTS PLAYGROUND</div>

        <div class="preview-meta" x-show="view === 'playground'" x-cloak>
            <span x-ref="outputFrameTitle">Preview</span>
        </div>

        <div style="display: flex; gap: 10px;">
            <button x-show="view === 'playground'" class="btn btn-primary" @click="saveFile()">Save</button>
            
            <div class="login" style="display: flex; align-items: center; gap: 10px;">
                <button x-show="!user" class="btn btn-primary" @click="netlifyIdentity.open()">Login</button>
                <div x-show="user" style="display: flex; align-items: center; gap: 10px;">
                    <span x-text="user?.user_metadata?.full_name" style="font-size: 0.8rem;"></span>
                    <button class="btn" @click="netlifyIdentity.logout()">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div class="workspace">
        <div x-show="view === 'home'" class="full-view" x-cloak>
            <template x-if="!user">
                <div style="text-align: center;">
                    <h1>Gist Dashboard</h1>
                    <p>Please login to see your Gists.</p>
                    <button class="btn btn-primary" style="padding: 12px 24px;" @click="netlifyIdentity.open()">Login with GitHub</button>
                </div>
            </template>
        </div>

        <div x-show="view === 'user'" class="full-view" x-cloak>
            <div style="width: 100%; max-width: 800px;">
                <h2>Gists by <span style="color: var(--accent)" x-text="username"></span></h2>
                <template x-for="gist in gists" :key="gist.id">
                    <div class="gist-card">
                        <div style="margin-bottom: 10px;">
                            <template x-for="fileName in Object.keys(gist.files)">
                                <span class="tagger" x-text="fileName"></span>
                            </template>
                        </div>
                        <h3 x-text="gist.description || 'No description'"></h3>
                        <button class="btn btn-primary" @click="openGist(gist.id)">Open in Playground</button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'playground'" class="workspace" style="width: 100%" x-cloak>
            <aside class="col-sidebar">
                <div class="sidebar-label">EXPLORER</div>
                <template x-for="fileName in Object.keys(files)" :key="fileName">
                    <div class="file-link" 
                         :class="activeFile === fileName ? 'file-active' : ''"
                         @click="selectFile(fileName)" 
                         x-text="fileName"></div>
                </template>
            </aside>

            <main class="col-code">
                <textarea 
                    x-show="activeFile && files && files[activeFile]"
                    x-model="files[activeFile]?.content" 
                    style="width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; border: none; padding: 20px; font-family: 'Fira Code', monospace; resize: none; outline: none;">
                </textarea>
                
                <div x-show="!activeFile || !files[activeFile]" style="padding: 20px; color: #666;">
                    Select a file to edit.
                </div>
            </main>

            <section class="col-preview">
                <div id="preview-container"></div>
            </section>
        </div>
    </div>

</body>
</html>
