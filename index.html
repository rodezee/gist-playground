<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gist Playground</title>
    <script src="gist-playground.js"></script>
    <script defer src="https://unpkg.com/alpinejs"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>

    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-header: #323233;
            --border: #454545;
            --text-main: #cccccc;
            --accent: #007acc;
        }

        [x-cloak] { display: none !important; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg-dark); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .btn { padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; border: 1px solid var(--border); background: #3c3c3c; color: white; }
        .btn-primary { background: var(--accent); border: none; }

        .top-nav { background: var(--bg-header); height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--border); }
        
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .col-sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .col-code { flex: 1; background: var(--bg-dark); border-right: 1px solid var(--border); }
        
        /* Preview Layout */
        .col-preview { flex: 1; background: #fff; display: flex; flex-direction: column; }
        .preview-header { 
            background: #f3f3f3; 
            color: #666; 
            padding: 5px 15px; 
            font-size: 0.7rem; 
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
        }

        textarea { width: 100%; height: 100%; background: transparent; color: #d4d4d4; border: none; padding: 20px; font-family: monospace; resize: none; outline: none; }
        
        .full-view { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .gist-card { background: var(--bg-sidebar); border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; width: 100%; max-width: 700px; }
        .tag { background: #3c3c3c; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; color: #4ec9b0; margin-right: 5px; }
        /* Editor Overlay Styles */
        .editor-wrapper {
            position: relative;
            flex: 1;
            background: #1e1e1e;
            overflow: auto;
        }

        #code, #highlight-layer {
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 21px;
            white-space: pre;
            word-wrap: normal;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
        }

        #code {
            z-index: 2;
            background: transparent !important;
            color: transparent !important;
            caret-color: #00ff00; /* Cursor color */
            resize: none;
            outline: none;
            overflow: hidden;
        }

        #highlight-layer {
            z-index: 1;
            pointer-events: none; /* Let clicks pass through to textarea */
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }
    </style>
</head>
<body x-data="gistPlayground">

    <header class="top-nav">
        <div style="display: flex; gap: 15px; align-items: center;">
            <div @click="view = 'home'" style="cursor:pointer; font-weight:bold;">
                <a href="https://github.com/rodezee/gist-playground">
                    <svg aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="18" height="18" fill="white" display="inline-block" overflow="visible" style="vertical-align:text-bottom">
                        <path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"></path>
                    </svg>
                </a>
                GIST PLAY
            </div>
            <input type="text" x-model="searchUser" placeholder="Username..." @keyup.enter="loadUserGists(searchUser)">
            <button class="btn" @click="loadUserGists(searchUser)">Load</button>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="password" x-model="pat" placeholder="PAT Token..." @change="savePat()" style="width: 120px;">
            <button x-show="view === 'playground'" class="btn btn-primary" @click="saveFile()">Save</button>
        </div>
    </header>

    <div class="workspace">
        <div x-show="view === 'home'" class="full-view" x-cloak>
            <h1>Gist Playground</h1>
            <p>Enter a username to browse, or add a PAT to edit.</p>
        </div>

        <div x-show="view === 'user'" class="full-view" x-cloak>
            <template x-for="gist in gists" :key="gist.id">
                <div class="gist-card">
                    <h3 x-text="gist.description || 'Untitled'"></h3>
                    <button class="btn btn-primary" @click="openGist(gist.id)">Open</button>
                </div>
            </template>
        </div>

        <div x-show="view === 'playground'" class="workspace" style="width: 100%" x-cloak>
            <aside class="col-sidebar">
                <template x-for="fileName in Object.keys(files)" :key="fileName">
                    <div style="padding: 10px; cursor: pointer; font-size: 0.8rem;" 
                         :style="activeFile === fileName ? 'background: #37373d; border-left: 2px solid var(--accent)' : ''"
                         @click="selectFile(fileName)" x-text="fileName"></div>
                </template>
            </aside>

            <main class="col-code">
                <div id="editor" style="width: 100%; height: 100%;"></div>
                
                <div x-show="!activeFile" style="padding: 20px; color: #666;">
                    Select a file to start editing...
                </div>
            </main>

            <section class="col-preview">
                <div class="preview-header">
                    <span id="preview-title">Preview</span>
                </div>
                <div id="preview-container" style="flex: 1;"></div>
            </section>
        </div>
    </div>

</body>
</html>
