<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gist Playground</title>
    
    <link rel="stylesheet" href="https://unpkg.com/cssalpine">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="gist-playground.js"></script>
    <script defer src="https://unpkg.com/alpine-turnout"></script>
    <script defer src="https://unpkg.com/alpinejs"></script>

    <style>
        [x-cloak] { display: none !important; }
        
        /* Force full height shell */
        html, body { height: 100vh; margin: 0; padding: 0; overflow: scroll; }
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* Navbar tweaks */
        header.top-nav { flex-shrink: 0; border-bottom: 1px solid var(--muted-border-color); padding: 0.5rem 1rem; }
        header.top-nav nav { margin-bottom: 0; }

        /* The 3-Column View */
        .playground-view { 
            display: flex; 
            flex: 1; 
            height: calc(100vh - 80px); /* Adjust based on nav height */
            overflow: hidden; 
        }
        
        .col-sidebar { width: 250px; border-right: 1px solid var(--muted-border-color); overflow-y: auto; flex-shrink: 0; }
        .col-code { flex: 1; overflow-y: auto; background: #1e1e1e; border-right: 1px solid #000; }
        .col-preview { flex: 1; background: white; position: relative; }

        /* Content Styles */
        .file-link { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--muted-border-color); font-size: 14px; }
        .file-link:hover { background: var(--secondary-hover); }
        .file-active { background: var(--primary) !important; color: white; font-weight: bold; }
        
        iframe { width: 100%; height: 100%; border: none; }
        pre { margin: 0; padding: 15px; height: 100%; }
        code { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body x-data="gistPlayground" x-init="initFromUrl()" class="app-shell">

    <header class="top-nav">
        <nav>
            <ul>
                <li @click="view = 'home'; history.pushState({}, '', '/')" style="cursor:pointer">
                    <strong>🚀 Gist Playground</strong>
                </li>
            </ul>
            <ul>
                <li><input type="text" x-model="searchUser" placeholder="Username..." @keydown.enter="goToUser()" style="margin-bottom:0"></li>
                <li><button @click="goToUser()" style="margin-bottom:0">Go</button></li>
            </ul>
        </nav>
    </header>

    <main class="flex-1">
        <template x-if="view === 'home'">
            <section class="container text-center" style="padding: 5rem 0;">
                <h1>Gist Explorer</h1>
                <p>Enter a GitHub username to see their code.</p>
            </section>
        </template>

        <template x-if="view === 'user'">
            <section class="container" style="padding: 2rem 0;">
                <h2>Gists for <span class="text-primary" x-text="username"></span></h2>
                <hr>
                <div class="grid">
                    <template x-for="gist in gists" :key="gist.id">
                        <article>
                            <header>
                                <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                                    <template x-for="fileName in Object.keys(gist.files)">
                                        <kbd style="font-size: 0.7rem;" x-text="fileName"></kbd>
                                    </template>
                                </div>
                            </header>
                            <p x-text="gist.description || 'No description'"></p>
                            <footer>
                                <button @click="openGist(gist.id)" class="outline">Open Playground</button>
                            </footer>
                        </article>
                    </template>
                </div>
            </section>
        </template>

        <template x-if="view === 'playground'">
            <section class="playground-view">
                <aside class="col-sidebar">
                    <div style="padding: 10px; font-weight: bold; font-size: 0.7rem; opacity: 0.5;">FILES</div>
                    <template x-for="(file, name) in files" :key="name">
                        <div class="file-link" 
                             :class="activeFile === name ? 'file-active' : ''"
                             @click="selectFile(name)" 
                             x-text="name"></div>
                    </template>
                </aside>

                <main class="col-code">
                    <pre><code :class="'language-' + getExt()" x-text="files[activeFile]?.content"></code></pre>
                </main>

                <section class="col-preview">
                    <iframe x-ref="outputFrame"></iframe>
                </section>
            </section>
        </template>
    </main>
</body>
</html>
