<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gist Playground</title>
    <script src="gist-playground.js"></script>
    <script defer src="https://unpkg.com/alpinejs"></script>

    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-header: #323233;
            --border: #454545;
            --text-main: #cccccc;
            --accent: #007acc;
        }

        [x-cloak] { display: none !important; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg-dark); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .btn { padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; border: 1px solid var(--border); background: #3c3c3c; color: white; }
        .btn-primary { background: var(--accent); border: none; }

        .top-nav { background: var(--bg-header); height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--border); }
        
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .col-sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .col-code { flex: 1; background: var(--bg-dark); border-right: 1px solid var(--border); }
        
        /* Preview Layout */
        .col-preview { flex: 1; background: #fff; display: flex; flex-direction: column; }
        .preview-header { 
            background: #f3f3f3; 
            color: #666; 
            padding: 5px 15px; 
            font-size: 0.7rem; 
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
        }

        textarea { width: 100%; height: 100%; background: transparent; color: #d4d4d4; border: none; padding: 20px; font-family: monospace; resize: none; outline: none; }
        
        .full-view { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .gist-card { background: var(--bg-sidebar); border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; width: 100%; max-width: 700px; }
        .tag { background: #3c3c3c; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; color: #4ec9b0; margin-right: 5px; }
        /* Editor Overlay Styles */
        .editor-wrapper {
            position: relative;
            flex: 1;
            background: #1e1e1e;
            overflow: auto;
        }

        #code, #highlight-layer {
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 21px;
            white-space: pre;
            word-wrap: normal;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
        }

        #code {
            z-index: 2;
            background: transparent !important;
            color: transparent !important;
            caret-color: #00ff00; /* Cursor color */
            resize: none;
            outline: none;
            overflow: hidden;
        }

        #highlight-layer {
            z-index: 1;
            pointer-events: none; /* Let clicks pass through to textarea */
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }
    </style>
</head>
<body x-data="gistPlayground">

    <header class="top-nav">
        <div style="display: flex; gap: 15px; align-items: center;">
            <div @click="view = 'home'" style="cursor:pointer; font-weight:bold;">🚀 GIST PLAY</div>
            <input type="text" x-model="searchUser" placeholder="Username..." @keyup.enter="loadUserGists(searchUser)">
            <button class="btn" @click="loadUserGists(searchUser)">Load</button>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="password" x-model="pat" placeholder="PAT Token..." @change="savePat()" style="width: 120px;">
            <button x-show="view === 'playground'" class="btn btn-primary" @click="saveFile()">Save</button>
        </div>
    </header>

    <div class="workspace">
        <div x-show="view === 'home'" class="full-view" x-cloak>
            <h1>Gist Playground</h1>
            <p>Enter a username to browse, or add a PAT to edit.</p>
        </div>

        <div x-show="view === 'user'" class="full-view" x-cloak>
            <template x-for="gist in gists" :key="gist.id">
                <div class="gist-card">
                    <h3 x-text="gist.description || 'Untitled'"></h3>
                    <button class="btn btn-primary" @click="openGist(gist.id)">Open</button>
                </div>
            </template>
        </div>

        <div x-show="view === 'playground'" class="workspace" style="width: 100%" x-cloak>
            <aside class="col-sidebar">
                <template x-for="fileName in Object.keys(files)" :key="fileName">
                    <div style="padding: 10px; cursor: pointer; font-size: 0.8rem;" 
                         :style="activeFile === fileName ? 'background: #37373d; border-left: 2px solid var(--accent)' : ''"
                         @click="selectFile(fileName)" x-text="fileName"></div>
                </template>
            </aside>

            <main class="col-code">
                <textarea x-model="files[activeFile].content" @input.debounce.500ms="updatePreview()"></textarea>
            </main>

            <section class="col-preview">
                <div class="preview-header">
                    <span id="preview-title">Preview</span>
                </div>
                <div id="preview-container" style="flex: 1;"></div>
            </section>
        </div>
    </div>

</body>
</html>
